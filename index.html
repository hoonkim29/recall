<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RECALL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;1,400&family=Noto+Sans+KR:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-deep:#09070a;--bg-dark:#110d0f;--bg-panel:#1a1418;--bg-card:#221820;
  --border-dim:#3d2838;--border-warm:#6b3f50;--border-gold:#c8a84b;--border-red:#7a2e2e;
  --text-bright:#f0ddc8;--text-main:#d4a898;--text-dim:#7a5858;--text-gold:#c8a84b;
  --ink-color:#6ab0e0;--fragment:#c8a84b;--remembered:#5a9a6a;--blood:#8b2222;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg-deep);color:var(--text-main);font-family:'Crimson Text','Noto Sans KR',serif;font-size:14px;overflow-x:hidden}
body{background-color:#0a0608;min-height:100vh;background-repeat:no-repeat;background-position:center;background-attachment:fixed;transition:background-image .4s}
body.bg-title,body.bg-title-vault,body.bg-battle-r1,body.bg-battle-r2,body.bg-map-r1,body.bg-map-r2{background-color:#0a0608;background-repeat:no-repeat;background-position:center center;background-size:cover;background-attachment:scroll}
body.bg-title{background-image:url("image/dorm_card.jpg")}
body.bg-title-vault{background-image:url("image/dorm_card_vault.jpg")}
body.bg-battle-r1{background-image:url("image/reception_table.png")}
body.bg-battle-r2{background-image:url("image/corridor_table.png")}
body.bg-map-r1{background-image:url("image/reception_table.png")}
body.bg-map-r2{background-image:url("image/corridor_table.png")}
body.bg-title::after,body.bg-title-vault::after,body.bg-battle-r1::after,body.bg-battle-r2::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:2;background:linear-gradient(to bottom,rgba(0,0,0,0.08) 0%,rgba(0,0,0,0.18) 40%,rgba(0,0,0,0.38) 85%,rgba(0,0,0,0.55) 100%)}
body.bg-map-r1::after,body.bg-map-r2::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:2;background:radial-gradient(ellipse at center,rgba(10,6,8,0.15) 0%,rgba(10,6,8,0.55) 45%,rgba(10,6,8,0.82) 85%,rgba(10,6,8,0.9) 100%)}
body.bg-soft{background:radial-gradient(ellipse at top,#2a1e22 0%,#1a1216 35%,#0e0a0e 75%,#06030a 100%)}
body.bg-soft::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:1;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n2'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.7  0 0 0 0 0.55  0 0 0 0 0.3  0 0 0 0.04 0'/></filter><rect width='100%' height='100%' filter='url(%23n2)'/></svg>");opacity:0.55;mix-blend-mode:overlay}
@media (min-width:760px){body.bg-map-r1,body.bg-map-r2{background-size:auto 100vh;background-position:center center}}
@media (max-width:759px){body.bg-map-r1,body.bg-map-r2{background-size:100% auto!important;background-position:center top!important;background-attachment:fixed!important}}
body::before{content:"";position:fixed;inset:0;pointer-events:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.7  0 0 0 0 0.55  0 0 0 0 0.3  0 0 0 0.05 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");opacity:0.5;z-index:1;mix-blend-mode:overlay}
body{min-height:100vh;display:flex;flex-direction:column;justify-content:center}
#app{max-width:520px;margin:0 auto;width:100%;padding:14px;position:relative;z-index:3;box-sizing:border-box}
h1,h2,h3{font-family:'Cinzel',serif;color:var(--text-gold);margin:6px 0;font-weight:600;letter-spacing:0.1em}
h1{font-size:46px;letter-spacing:0.3em;text-shadow:0 0 16px rgba(200,168,75,0.4)}
button{background:linear-gradient(to bottom,var(--bg-panel),var(--bg-card));color:var(--text-main);border:1.5px solid var(--border-warm);border-radius:4px;padding:10px 14px;font-size:15px;cursor:pointer;font-family:inherit;letter-spacing:0.04em;transition:all .2s}
button:hover:not(:disabled){border-color:var(--border-gold);color:var(--text-bright)}
button:disabled{opacity:0.35;cursor:not-allowed}
button.primary{border-color:var(--border-gold);color:var(--text-gold)}
.screen{animation:fadeIn .4s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.panel{background:linear-gradient(to bottom,rgba(26,20,24,0.9),rgba(17,13,15,0.9));border:1px solid var(--border-dim);border-radius:5px;padding:10px;margin:6px 0;box-shadow:inset 0 0 18px rgba(0,0,0,0.5)}
.center{text-align:center}.dim{color:var(--text-dim);font-size:11px}.gold{color:var(--text-gold)}.cinzel{font-family:'Cinzel',serif;letter-spacing:0.08em}
.card{width:110px;height:154px;background:linear-gradient(to bottom,#2a1e28,#1a1418);border:1.5px solid var(--border-warm);border-radius:6px;padding:3px;display:inline-flex;flex-direction:column;margin:2px;position:relative;cursor:pointer;user-select:none;transition:transform .18s,border-color .18s;box-shadow:inset 0 0 10px rgba(0,0,0,0.6);overflow:hidden;font-family:'Cinzel',serif;vertical-align:top}
.card:hover{border-color:var(--border-gold);transform:translateY(-3px)}
.card.selected{border-color:var(--border-gold);box-shadow:0 0 12px rgba(200,168,75,0.6)}
.card.remembered{border-color:var(--remembered)}
.card .cost{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#8ec8e8,#3e80b8);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;z-index:2}
.card[data-cost="0"] .cost{background:radial-gradient(circle at 30% 30%,#6a6a6a,#333)}
.card .name{font-size:12px;font-weight:600;color:var(--text-bright);padding:2px 22px 2px 24px;line-height:1.15;min-height:22px;overflow:hidden;white-space:nowrap}
.card .name.name-sm{font-size:10px}
.card .name.name-xs{font-size:8.5px;letter-spacing:-0.02em}
.card .art{flex:1 1 0;min-height:0;margin:1px 0;border-radius:2px;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;border:1px solid rgba(0,0,0,0.4);overflow:hidden}
.card .art svg{width:100%;height:100%;max-height:100%;display:block}
.card .stats{display:flex;justify-content:space-around;padding:3px 3px 0;font-size:13px;color:var(--text-gold);font-weight:600}
.card .sigil{font-size:7px;color:var(--text-dim);text-align:center;text-transform:uppercase}
.card .sigil-stack{position:absolute;top:4px;left:4px;display:flex;flex-direction:column;gap:2px;z-index:2}
.card .sigil-badge{width:20px;height:20px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(60,40,30,0.95),rgba(10,6,8,0.95));display:flex;align-items:center;justify-content:center;font-size:14px;border:1px solid rgba(200,168,75,0.65);box-shadow:0 0 6px rgba(200,168,75,0.25),inset 0 0 4px rgba(200,168,75,0.1);animation:sigil-glow 2.4s ease-in-out infinite}
@keyframes sigil-glow{0%,100%{box-shadow:0 0 4px rgba(200,168,75,0.2),inset 0 0 4px rgba(200,168,75,0.08)}50%{box-shadow:0 0 10px rgba(200,168,75,0.55),inset 0 0 6px rgba(200,168,75,0.18)}}
.map-node.available circle{filter:drop-shadow(0 0 6px rgba(200,168,75,0.5))}
.card{transition:transform .2s cubic-bezier(.3,1.3,.6,1),border-color .18s,box-shadow .18s}
.card:hover{box-shadow:0 8px 18px rgba(0,0,0,0.7),0 0 14px rgba(200,168,75,0.35)}
.slot{width:110px;height:154px;border:1.5px solid var(--border-dim);border-radius:6px;background:linear-gradient(135deg,#140c10,#0a0608);display:inline-flex;margin:2px;vertical-align:top;position:relative;cursor:pointer;align-items:center;justify-content:center;color:var(--text-dim);font-size:11px;font-family:'Cinzel',serif;box-shadow:inset 0 0 10px rgba(0,0,0,0.7)}
.slot.targeted{border-color:var(--border-gold);box-shadow:0 0 10px rgba(200,168,75,0.4)}
.slot.warden{border-color:#3a1e24}
.row{display:flex;justify-content:center;flex-wrap:nowrap;overflow-x:auto;padding:2px 0}
.hand{display:flex;overflow-x:auto;gap:1px;padding:2px 0;min-height:114px}
.fragments{font-size:24px;letter-spacing:5px;text-align:center;margin:4px 0;font-family:'Cinzel',serif;text-shadow:0 0 6px currentColor}
.fragments.player{color:var(--fragment)}
.fragments.warden{color:var(--border-red);filter:brightness(1.3)}
.divider{height:2px;margin:6px 0;background:linear-gradient(to right,transparent,var(--border-gold),transparent);position:relative}
.divider::before{content:"❦";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--bg-dark);padding:0 8px;color:var(--border-gold);font-size:12px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px}
.modal-content{background:linear-gradient(to bottom,var(--bg-panel),var(--bg-dark));border:1.5px solid var(--border-gold);border-radius:5px;padding:16px;max-width:400px;width:100%}
.dialogue{font-style:italic;color:var(--text-bright);margin:6px 0;line-height:1.6;font-size:16px;font-family:'Crimson Text','Noto Sans KR',serif}
.speaker{font-family:'Cinzel',serif;color:var(--text-gold);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:4px}
.msg{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--bg-panel);border:1px solid var(--border-gold);padding:6px 14px;border-radius:3px;z-index:250;font-size:12px;color:var(--text-bright)}
.ink{color:var(--ink-color);font-family:'Cinzel',serif;font-weight:600;font-size:16px}
.item-btn{background:#2a1e26;border:1px solid #5a9a6a;color:#c8a84b;border-radius:4px;padding:2px 8px;font-size:14px;margin:0 2px;cursor:pointer}
.item-btn:hover{background:#3a2e36;border-color:#c8a84b}
@keyframes hit-shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px);filter:brightness(1.8) hue-rotate(-20deg)}75%{transform:translateX(5px);filter:brightness(1.8) hue-rotate(-20deg)}}
@keyframes card-die{to{transform:scale(0.7) rotate(-15deg);opacity:0}}
.card.hit{animation:hit-shake 0.25s ease}
.card.dying{animation:card-die 0.4s forwards}
.card.faded-card{opacity:0.4;filter:grayscale(1) brightness(0.6)}
.side-fans{position:fixed;right:8px;top:80px;display:flex;flex-direction:column;gap:14px;z-index:90;pointer-events:none}
.side-fans .fan{width:58px;height:80px;position:relative;pointer-events:auto}
.side-fans .fan .card-back{position:absolute;width:40px;height:58px;border-radius:5px;background:linear-gradient(135deg,#2a1824,#120a0f);border:1px solid var(--border-dim);box-shadow:0 3px 8px rgba(0,0,0,0.7);left:50%;top:6px;transform-origin:50% 100%}
.side-fans .fan .card-back:nth-child(1){transform:translateX(-50%) rotate(-14deg)}
.side-fans .fan .card-back:nth-child(2){transform:translateX(-50%) rotate(0deg)}
.side-fans .fan .card-back:nth-child(3){transform:translateX(-50%) rotate(14deg)}
.side-fans .fan .lbl{position:absolute;bottom:-14px;left:0;right:0;text-align:center;font-size:9px;color:var(--text-dim);letter-spacing:0.5px}
.side-fans .fan.tappable{cursor:pointer}
.side-fans .fan.tappable:hover .card-back{border-color:var(--border-gold);box-shadow:0 3px 12px rgba(200,168,75,0.4)}
.side-fans .fan.warden .card-back{background:linear-gradient(135deg,#2a0e14,#0d0608);border-color:#3a1e24}
.card.remembered{border-color:var(--remembered)!important;box-shadow:0 0 8px rgba(90,154,106,0.3)}
.card.death{border-color:#8b2222!important;box-shadow:0 0 10px rgba(139,34,34,0.5);background:linear-gradient(135deg,#221820 0%,#2a1818 100%)}
@keyframes flicker{0%,100%{opacity:1}10%{opacity:0.3}20%{opacity:1}30%{opacity:0.6}40%{opacity:1}}
.battery-flicker{animation:flicker 1.5s}
@keyframes screen-off{0%{clip-path:inset(0 0 0 0);filter:brightness(1)}50%{filter:brightness(0.4)}100%{clip-path:inset(0 0 100% 0);filter:brightness(0)}}
.screen-off{animation:screen-off 2s forwards}
.scanlines{position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.3) 0,rgba(0,0,0,0.3) 2px,transparent 2px,transparent 4px);z-index:9999;animation:fadeIn 0.5s}
input[type=text]{background:var(--bg-card);color:var(--text-bright);border:1px solid var(--border-warm);border-radius:3px;padding:7px;font-size:13px;width:100%;font-family:inherit}
input[type=text]:focus{outline:none;border-color:var(--border-gold)}
.action-bar{display:flex;justify-content:space-between;align-items:center;padding:4px 2px;gap:4px;flex-wrap:wrap}
.draw-area{display:flex;gap:8px;justify-content:center;padding:8px 0}
.draw-btn{width:110px;height:130px;border:2px solid var(--border-warm);border-radius:6px;background:linear-gradient(135deg,#2a1e28,#110d0f);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-family:'Cinzel',serif;color:var(--text-bright);transition:all .2s}
.draw-btn:hover:not(:disabled){border-color:var(--border-gold);transform:translateY(-2px)}
.draw-btn:disabled{opacity:0.3;cursor:not-allowed}
.draw-btn .icon{font-size:26px;margin-bottom:4px}
.draw-btn .label{font-size:11px;text-align:center}
.title-wrap{padding-top:50px;text-align:center}
.title-deck{width:140px;height:196px;border:2px solid var(--border-gold);border-radius:10px;background:linear-gradient(135deg,#2a1e28 0%,#1a1418 60%,#3a2a28 100%);margin:24px auto;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 28px rgba(200,168,75,0.3),inset 0 0 28px rgba(0,0,0,0.6);animation:pg 3s ease-in-out infinite}
.title-deck::before{content:"RECALL";font-family:'Cinzel',serif;font-size:16px;color:var(--text-gold);letter-spacing:0.3em}
@keyframes pg{0%,100%{box-shadow:0 0 22px rgba(200,168,75,0.2),inset 0 0 28px rgba(0,0,0,0.6)}50%{box-shadow:0 0 40px rgba(200,168,75,0.5),inset 0 0 28px rgba(0,0,0,0.6)}}
.map-svg{width:100%;display:block;margin:8px 0}
.map-node{cursor:pointer}
.map-node.available circle{animation:np 2s ease-in-out infinite}
@keyframes np{0%,100%{filter:drop-shadow(0 0 3px rgba(200,168,75,0.5))}50%{filter:drop-shadow(0 0 10px rgba(200,168,75,0.9))}}
.room-scene{perspective:900px;perspective-origin:50% 35%;position:relative;height:360px;margin:16px auto;max-width:440px;transform-style:preserve-3d}
.room-scene .floor{position:absolute;left:0;right:0;bottom:0;height:180px;transform:rotateX(55deg) translateZ(-40px);transform-origin:center bottom;background:repeating-linear-gradient(90deg,#1a1216 0,#1a1216 40px,#1e1519 40px,#1e1519 80px);opacity:0.85}
.room-scene .wall{position:absolute;left:0;right:0;top:0;height:220px;transform:translateZ(-200px);background:linear-gradient(180deg,#0d0a0e 0%,#1a1418 100%)}
.room-scene .obj{position:absolute;padding:10px 14px;background:linear-gradient(135deg,#2a1e24,#1a1218);border:1px solid var(--border-dim);border-radius:6px;color:var(--text-main);font-size:13px;cursor:pointer;transform:translateZ(15px);box-shadow:0 15px 30px rgba(0,0,0,0.7),0 5px 10px rgba(0,0,0,0.5);transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;text-align:center}
.room-scene .obj:hover{transform:translateZ(25px) scale(1.04);box-shadow:0 22px 44px rgba(0,0,0,0.85);border-color:var(--border-gold);color:var(--text-gold)}
.room-scene .obj::before{content:'';position:absolute;bottom:-8px;left:10%;width:80%;height:8px;background:radial-gradient(ellipse,rgba(0,0,0,0.6) 0%,transparent 70%);filter:blur(4px);pointer-events:none}
.phone-btn{position:fixed;right:10px;bottom:10px;width:130px;height:210px;background:linear-gradient(to bottom,#2a1e28,#110d0f);border:1.5px solid var(--border-gold);border-radius:10px;cursor:pointer;z-index:150;padding:8px;font-family:'Noto Sans KR','Crimson Text',serif;color:var(--text-main);text-align:left;overflow:hidden;box-shadow:0 6px 16px rgba(0,0,0,0.6),inset 0 0 10px rgba(0,0,0,0.5)}
.phone-btn .pm-head{display:flex;justify-content:space-between;font-size:9px;color:var(--text-dim);margin-bottom:4px}
.phone-btn .pm-pips{font-size:8px;color:#c8a84b;letter-spacing:1px;margin-bottom:6px}
.phone-btn .pm-name{font-family:'Cinzel',serif;font-size:11px;color:var(--text-bright);margin-bottom:4px}
.phone-btn .pm-msg{font-size:10px;line-height:1.3;color:var(--text-dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.phone-btn .pm-msg.me{color:var(--text-main);text-align:right}
.phone-btn.pulse{animation:pmpulse 0.9s ease-in-out infinite}
@keyframes pmpulse{0%,100%{box-shadow:0 6px 16px rgba(0,0,0,0.6),0 0 0 rgba(200,80,80,0)}50%{box-shadow:0 6px 16px rgba(0,0,0,0.6),0 0 18px rgba(200,80,80,0.8)}}
.phone-btn .mobile-icon{display:none}
.phone-drag-handle{display:none}
.phone-unread-dot{position:absolute;top:6px;right:6px;width:10px;height:10px;border-radius:50%;background:#e24848;border:2px solid #1a1418;box-shadow:0 0 6px rgba(226,72,72,0.7);display:none}
.phone-btn.has-unread .phone-unread-dot{display:block}
@keyframes atk-rush{0%{transform:translateY(0)}30%{transform:translateY(-18px)}60%{transform:translateY(-110px)}100%{transform:translateY(0)}}
@keyframes atk-rush-down{0%{transform:translateY(0)}30%{transform:translateY(18px)}60%{transform:translateY(110px)}100%{transform:translateY(0)}}
@keyframes atk-wave{0%,100%{opacity:1;filter:brightness(1)}40%{opacity:0.4;filter:brightness(1.8) hue-rotate(-30deg)}70%{opacity:0.7}}
@keyframes atk-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes atk-arc{0%{transform:translate(0,0) rotate(0)}30%{transform:translate(10px,-40px) rotate(-12deg)}60%{transform:translate(30px,-80px) rotate(-25deg)}100%{transform:translate(0,0) rotate(0)}}
@keyframes atk-arc-down{0%{transform:translate(0,0) rotate(0)}30%{transform:translate(10px,40px) rotate(12deg)}60%{transform:translate(30px,80px) rotate(25deg)}100%{transform:translate(0,0) rotate(0)}}
@keyframes warden-deal{0%{transform:translate(0,-80px) rotateY(180deg);opacity:0}30%{opacity:1}100%{transform:translate(0,0) rotateY(180deg);opacity:1}}
@keyframes warden-flip{0%{transform:rotateY(180deg)}100%{transform:rotateY(0deg)}}
@keyframes block-pop{0%{transform:translateY(0) scale(0.6);opacity:0}15%{transform:translateY(-6px) scale(1.2);opacity:1}30%{transform:translateY(-12px) scale(1);opacity:1}75%{transform:translateY(-24px) scale(1);opacity:1}100%{transform:translateY(-34px) scale(0.9);opacity:0}}
.card.facedown .name,.card.facedown .art,.card.facedown .stats,.card.facedown .sigil,.card.facedown .cost{visibility:hidden}
.card.facedown{background:linear-gradient(135deg,#3a2028 0%,#1a0e14 50%,#3a2028 100%);border-color:#5a3848;position:relative;backface-visibility:hidden;transform-style:preserve-3d}
.card.facedown::after{content:"◈";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:36px;color:#8a6a4a;text-shadow:0 0 8px rgba(138,106,74,0.4);letter-spacing:0.1em}
.card.warden-dealing{animation:warden-deal .5s ease-out forwards;transform-origin:center}
.card.warden-flipping{animation:warden-flip .55s ease-in-out forwards;transform-origin:center}
.warden-plan-preview{margin-top:6px;display:flex;justify-content:center;align-items:center;gap:6px;min-height:56px}
.plan-silhouette{min-width:42px;padding:3px 4px;border:1.5px dashed #7a4a58;border-radius:5px;background:linear-gradient(135deg,rgba(30,18,24,0.7),rgba(14,8,12,0.7));display:flex;flex-direction:column;align-items:center;gap:1px;box-shadow:inset 0 0 8px rgba(0,0,0,0.4)}
.plan-silhouette .plan-art{width:26px;height:26px;opacity:0.6;filter:grayscale(0.6) brightness(0.9)}
.plan-silhouette .plan-art *{stroke:#a88080!important;fill:#a88080!important}
.plan-silhouette .plan-stats{font-size:9px;color:#d0a0a0;letter-spacing:0.3px;font-weight:600;line-height:1.05;display:flex;flex-direction:column;align-items:center;gap:0}
.plan-silhouette .plan-sigils{display:flex;gap:1px;font-size:10px;margin-top:1px}

const appEl=()=>document.getElementById('app');

function showScreen(name,opts={}){
  const root=appEl();
  if(name!=='battle'&&typeof tutorialClose==='function')tutorialClose();
  const el=document.createElement('div');el.className='screen';
  if(name==='battle')el.style.animation='none';

  if(name==='title')document.body.classList.add(G.runCount>=3?'bg-title-vault':'bg-title');
  else if(name==='battle')document.body.classList.add(G.currentRoom===2?'bg-battle-r2':'bg-battle-r1');
  else if(name==='map')document.body.classList.add(G.currentRoom===2?'bg-map-r2':'bg-map-r1');

  lb.addEventListener('click',()=>{LANG=LANG==='ko'?'en':'ko';localStorage.setItem('recall_lang',LANG);setScreen(G.screen,opts);});
  document.body.appendChild(lb);
  if(!['title','cutscene','regression','loopending','bossreward'].includes(name))addPhone();
  switch(name){
    case 'title':renderTitle(el);break;
    case 'cutscene':renderCutscene(el,opts);break;
    case 'map':renderMap(el);break;
    case 'battle':renderBattle(el,opts);break;
    case 'memorybox':renderMemoryBox(el,opts);break;
    case 'campfire':renderCampfire(el);break;
    case 'vault':renderVault(el);break;
    case 'relic':renderRelic(el);break;
    case 'fuse':renderFuse(el);break;
    case 'reclass':renderReclass(el);break;
    case 'explore':renderExplore(el);break;
    case 'mystery':renderMystery(el,opts);break;
    case 'lockpuzzle':renderLockPuzzle(el);break;
    case 'victory':renderVictory(el);break;
    case 'cardchoice':renderCardChoice(el);break;
    case 'bossreward':renderBossReward(el);break;
    case 'loopending':renderLoopEnding(el);break;
    case 'regression':renderRegression(el);break;
  }
  root.replaceChildren(el);
  if(!['title','cutscene','regression','loopending','bossreward'].includes(name))addPhone();
  ensureFabStack();
}

function fragStarSvg(filled,side){const fill=filled?(side==='warden'?'#c44848':'#c8a84b'):'transparent';const stroke=side==='warden'?'#c44848':'#c8a84b';const op=filled?1:0.4;return `<svg viewBox="0 0 24 24" width="22" height="22" style="vertical-align:middle;filter:drop-shadow(0 0 4px ${stroke})"><path d="M12 2 L14.5 9 L22 9.5 L16 14 L18 21 L12 17 L6 21 L8 14 L2 9.5 L9.5 9 Z" fill="${fill}" stroke="${stroke}" stroke-width="1.5" stroke-linejoin="round" opacity="${op}"/></svg>`;}

function isMsgLocked(m){if(!m.lock)return false;if(m.lock==='last')return true;if(m.lock==='r1lock2')return !G.solvedLocks[1];if(m.lock==='r2chestA')return !G.completedNodes.includes('r2_chestA');return true;}
const MSG_CLUSTERS=[{start:0,end:5,daysAgo:7,baseH:23,baseM:14},{start:6,end:11,daysAgo:6,baseH:14,baseM:2},{start:12,end:12,daysAgo:5,baseH:21,baseM:31},{start:13,end:22,daysAgo:4,baseH:22,baseM:10},{start:23,end:28,daysAgo:3,baseH:18,baseM:7},{start:29,end:34,daysAgo:2,baseH:17,baseM:44},{start:35,end:39,daysAgo:1,baseH:19,baseM:22},{start:40,end:48,daysAgo:0,baseH:12,baseM:5}];
function msgMeta(idx){const cluster=MSG_CLUSTERS.find(c=>idx>=c.start&&idx<=c.end);if(!cluster)return null;const d=new Date();d.setDate(d.getDate()-cluster.daysAgo);d.setHours(cluster.baseH,cluster.baseM+(idx-cluster.start)*3,0,0);let dateLabel;if(cluster.daysAgo===0)dateLabel=LANG==='ko'?'오늘':'Today';else if(cluster.daysAgo===1)dateLabel=LANG==='ko'?'어제':'Yesterday';else dateLabel=LANG==='ko'?`${d.getMonth()+1}월 ${d.getDate()}일 (${['일','월','화','수','목','금','토'][d.getDay()]})`:d.toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric'});const h=d.getHours();const m=String(d.getMinutes()).padStart(2,'0');const ampm=LANG==='ko'?(h<12?'오전':'오후'):(h<12?'AM':'PM');const h12=h%12||12;const time=LANG==='ko'?`${ampm} ${h12}:${m}`:`${h12}:${m} ${ampm}`;return {dateLabel,time,daysAgo:cluster.daysAgo};}
function mT(m){return typeof m.t==='string'?m.t:(m.t?.[LANG]||m.t?.ko||'');}
function visMsgs(){return J_MSGS.map((m,i)=>({...m,idx:i,meta:msgMeta(i)})).filter(m=>!G.deletedMsgs.includes(m.idx));}
function renderPhoneMini(){const b=document.querySelector('.phone-btn');if(!b)return;const vis=visMsgs();const allDel=vis.length===0;const name=allDel?(LANG==='ko'?'알 수 없는 번호':'Unknown'):'J';const sc=G.sacrificeCounter||0;const pips='●'.repeat(sc)+'○'.repeat(10-sc);const last2=vis.slice(-2);const msgsHtml=last2.map(m=>{const s=m.s||m.sender;const t=mT(m)||m.text||'';return `<div class="pm-msg ${s==='me'?'me':''}">${s==='me'?'':'J: '}${t.length>14?t.slice(0,14)+'…':t}</div>`;}).join('')||`<div class="pm-msg" style="text-align:center;opacity:0.4">— — —</div>`;const unreadKeys=(G.unreadMsgs||[]).length;const hasUnread=unreadKeys>0||G.sacrificeMode||sc>=9;b.innerHTML=`<span class="mobile-icon">📱</span><span class="phone-unread-dot"></span><div class="pm-head"><span>🔋${G.battery}%</span><span>📱</span></div><div class="pm-pips">${pips}</div><div class="pm-name">${name}</div>${msgsHtml}`;b.classList.toggle('pulse',G.sacrificeMode||sc>=9);b.classList.toggle('has-unread',hasUnread);}
function addPhone(){removePhone();const b=document.createElement('button');b.className='phone-btn';b.addEventListener('click',togglePhone);document.body.appendChild(b);const bd=document.createElement('div');bd.className='phone-backdrop';bd.id='phoneBackdrop';bd.addEventListener('click',()=>{if(G.phoneOpen&&!G.sacrificeMode)togglePhone();});document.body.appendChild(bd);const o=document.createElement('div');o.className='phone-overlay';o.id='phoneOverlay';o.addEventListener('click',e=>e.stopPropagation());document.body.appendChild(o);renderPhone();renderPhoneMini();}
function attachPhoneCloseGesture(o){const handles=o.querySelectorAll('.phone-drag-handle,.phone-header');handles.forEach(h=>{let sy=null;h.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;},{passive:true});h.addEventListener('touchmove',e=>{if(sy==null)return;const dy=e.touches[0].clientY-sy;if(dy>60&&window.innerWidth<=520&&!G.sacrificeMode){sy=null;togglePhone();}},{passive:true});h.addEventListener('touchend',()=>{sy=null;},{passive:true});});}

function renderPhone(){renderPhoneMini();const o=document.getElementById('phoneOverlay');if(!o)return;const vis=visMsgs();const allGone=vis.length===0;const name=allGone?T('unknown'):'J';o.innerHTML=`<div class="phone-drag-handle"></div><div class="phone-header"><div class="phone-avatar${allGone?' empty':''}"></div><div class="phone-name">${name}</div><button class="phone-close">×</button></div><div class="phone-body" id="pb"></div>`;o.querySelector('.phone-close').addEventListener('click',togglePhone);attachPhoneCloseGesture(o);const body=o.querySelector('#pb');if(allGone){body.innerHTML=`<div class="dim center" style="margin-top:40px">${T('empty_chat')}</div>`;return;}const isLastLove=vis.length===1&&vis[0].lock==='last';let lastDay=null;vis.forEach(m=>{const meta=m.meta;if(meta&&meta.daysAgo!==lastDay){const sep=document.createElement('div');sep.className='chat-day';sep.textContent=meta.dateLabel;body.appendChild(sep);lastDay=meta.daysAgo;}const row=document.createElement('div');row.className='chat-row '+m.s;const bub=document.createElement('div');bub.className='chat-bubble '+m.s;const locked=isMsgLocked(m)&&m.lock!=='last';const isLove=m.lock==='last';const showLock=locked||(isLove&&!isLastLove);bub.textContent=(showLock?'🔒 ':'')+mT(m);if(locked)bub.classList.add('locked');if(isLove&&!isLastLove)bub.classList.add('locked');if(isLove&&isLastLove)bub.classList.add('love');if(G.sacrificeMode&&!locked&&(!isLove||isLastLove)){bub.classList.add('selectable');bub.addEventListener('click',()=>onDeleteMsg(m.idx,isLove&&isLastLove));}row.appendChild(bub);if(meta){const tm=document.createElement('div');tm.className='chat-time';tm.textContent=meta.time;row.appendChild(tm);}body.appendChild(row);});body.scrollTop=body.scrollHeight;}
function onDeleteMsg(idx,isLove){if(isLove){const w=document.createElement('div');w.className='modal';const mc=document.createElement('div');mc.className='modal-content';mc.innerHTML=`<div class="dialogue">${T('love_warning')}</div>`;const d=document.createElement('button');d.className='primary';d.textContent=T('delete');d.style.marginRight='8px';const bk=document.createElement('button');bk.textContent=T('back_btn');d.addEventListener('click',()=>{w.remove();doDelMsg(idx);});bk.addEventListener('click',()=>w.remove());mc.appendChild(d);mc.appendChild(bk);w.appendChild(mc);document.body.appendChild(w);return;}doDelMsg(idx);}

function visibleSigils(){const cards=[...G.playerSlots,...G.wardenSlots.filter(c=>c&&!c._facedown),...(G.playerHand||[])];const seen=new Set();cards.forEach(c=>{if(!c)return;const sigs=c.sigils&&c.sigils.length?c.sigils:(c.sigil?[c.sigil]:[]);sigs.forEach(s=>seen.add(s));});return [...seen];}

let _lastTutOpts=null;
function tutorialStep(opts){
  tutorialClose();
  if(G.screen!=='battle')return;
  _lastTutOpts=opts;
  const {target,textKo,textEn,buttonKo='계속',buttonEn='Continue',waitForAction,onDone,highlightCard,highlightPlayerSlotWith,outlineTargets,dialogAnchor}=opts;
  let hlRect=null;
  // Unified: collect DOM elements to light up via .tut-lit (no dark overlay)
  const litEls=[];
  if (target){const el=typeof target==='string'?document.querySelector(target):target;if(el)litEls.push(el);}
  if (highlightCard){const idx=G.playerHand.findIndex(c=>c.id===highlightCard);if(idx>=0){const el=document.querySelectorAll('#hand .card')[idx];if(el)litEls.push(el);}}
  if (highlightPlayerSlotWith){const idx=G.playerSlots.findIndex(c=>c&&c.id===highlightPlayerSlotWith);if(idx>=0){const el=document.querySelector(`.player-slot[data-slot="${idx}"]`);if(el)litEls.push(el);}}
  if (outlineTargets){outlineTargets.forEach(sel=>{
    if (typeof sel==='string' && sel.startsWith('hand:')){const cid=sel.slice(5);const idx=G.playerHand.findIndex(c=>c.id===cid);if(idx>=0){const el=document.querySelectorAll('#hand .card')[idx];if(el)litEls.push(el);}}
    else if (sel==='emptyPlayerSlots'){document.querySelectorAll('.player-slot').forEach((el,i)=>{if(!G.playerSlots[i])litEls.push(el);});const panel=document.querySelector('#ps')?.closest('.panel.battle-field');if(panel)panel.classList.add('tut-lit-panel');}
    else {const el=document.querySelector(sel);if(el)litEls.push(el);}
  });}
  litEls.forEach(el=>el.classList.add('tut-lit'));
  // Anchor for dialog positioning
  if (dialogAnchor){const el=document.querySelector(dialogAnchor);if(el)hlRect=el.getBoundingClientRect();}
  else if (litEls.length){hlRect=litEls[0].getBoundingClientRect();}
  const dialog=document.createElement('div');dialog.className='tut-dialog';
  dialog.innerHTML=`<div class="tut-label">${LANG==='ko'?'안내':'Guide'}</div><div>${LANG==='ko'?textKo:textEn}</div>${waitForAction?'':`<button class="primary">${LANG==='ko'?buttonKo:buttonEn}</button>`}`;
  document.body.appendChild(dialog);
  // Position dialog avoiding highlight
  const vw=window.innerWidth,vh=window.innerHeight;
  const dr=dialog.getBoundingClientRect();
  let dx,dy;
  if (hlRect){
    const spaceBelow=vh-hlRect.bottom,spaceAbove=hlRect.top;
    // Prefer ABOVE the target for waitForAction so user sees card clearly below dialog
    if (waitForAction){
      if (spaceAbove>=dr.height+20) dy=hlRect.top-dr.height-12;
      else if (spaceBelow>=dr.height+20) dy=hlRect.bottom+12;
      else dy=Math.max(12,Math.min(vh-dr.height-12, hlRect.top<vh/2?hlRect.bottom+12:hlRect.top-dr.height-12));
    } else {
      if (spaceBelow>=dr.height+20) dy=hlRect.bottom+12;
      else if (spaceAbove>=dr.height+20) dy=hlRect.top-dr.height-12;
      else dy=Math.max(12,vh-dr.height-12);
    }
    dx=Math.max(12,Math.min(vw-dr.width-12,hlRect.left+hlRect.width/2-dr.width/2));
  } else {
    dx=(vw-dr.width)/2; dy=(vh-dr.height)/2;
  }
  dialog.style.left=dx+'px';dialog.style.top=dy+'px';
  if (!waitForAction){
    dialog.querySelector('button').addEventListener('click',()=>{tutorialClose();onDone&&onDone();});
  }
  return {dialog,close:tutorialClose};
}

// BATTLE
function enterBattle(opts){
  G.isBossBattle=!!opts.isBoss;G.playerFragments=5;G.wardenFragments=5;G.currentInk=0;G.oblivionGauge=0;G.turnCount=0;G.battleDiscard=[];G.resonanceActive=false;G.lowFragWarned=false;if(G.battery==null)G.battery=100;
  G.playerSlots=[null,null,null,null];G.wardenSlots=[null,null,null,null];G.playerHand=[];G.selectedHandIdx=null;G.battlePhase='play';
  G.playerDeck=shuffle(G.playerDeck);
  for(let i=0;i<3;i++){if(G.playerDeck.length)G.playerHand.push(G.playerDeck.pop());}
  // Tutorial (run 0 first battle): guarantee afterimage in hand since the tutorial walks through it
  if(G.runCount===0 && !G.playerHand.some(c=>c.id==='afterimage')){
    const ai=G.playerDeck.findIndex(c=>c.id==='afterimage');
    if(ai>=0){const swap=G.playerHand.findIndex(c=>c.id!=='afterimage')??0;if(swap>=0){G.playerDeck.push(G.playerHand[swap]);G.playerHand[swap]=G.playerDeck.splice(ai,1)[0];}}
  }
  G.playerHand.push(mkCard('faded_memory'));
  const which=G.currentRoom===1?(opts.isBoss?'elise_boss':'elise_normal'):(opts.isBoss?'owen_boss':'owen_normal');
  G.wardenDeck=buildWardenDeck(which);
  G.wardenHand=[];for(let i=0;i<3;i++){if(G.wardenDeck.length)G.wardenHand.push(G.wardenDeck.pop());}
  const uniqCompleted=[...new Set(G.completedNodes)];
  const firstBattle=uniqCompleted.filter(n=>{const nd=MAPS[G.currentRoom]?.nodes[n];return nd&&(nd.type==='battle'||nd.type==='battle_hint'||nd.type==='boss');}).length===0;
  let prePlaced=opts.isBoss?(G.currentRoom===2?2:1):(firstBattle?0:Math.min(1,Math.floor(uniqCompleted.length/4)));
  for(let i=0;i<4&&prePlaced>0;i++){if(G.wardenHand.length===0)break;const c=G.wardenHand.shift();G.wardenSlots[i]=c;prePlaced--;}
  G.wardenNextPlan=[];computeWardenPlan();
  setScreen('battle',{_started:true,isBoss:opts.isBoss});
  // Tutorial starts AFTER warden greeting modal dismissed (avoids modal conflict)
}

  const ws=root.querySelector('#ws');G.wardenSlots.forEach((c,i)=>{let el;if(c){el=renderCardEl(c);if(c._facedown)el.classList.add('facedown');}else{el=document.createElement('div');el.className='slot warden';el.textContent='·';}el.classList.add('warden-slot');el.dataset.slot=i;ws.appendChild(el);});

  }
}

function requestSacrifice(slotIdx){if(G.battlePhase!=='play')return;G.currentInk+=1;G.playerSlots[slotIdx]=null;G.sacrificeCounter+=1;saveGame();if(G.sacrificeCounter>=10){G.sacrificeCounter=0;saveGame();G.sacrificeMode=true;G.phoneOpen=true;document.getElementById('phoneOverlay')?.classList.add('open');renderPhone();msg(T('sacrifice_select'));}else{msg(`💧+1 · ${G.sacrificeCounter}/10`);}if(G.screen==='battle')showScreen('battle',{_started:true,_greeted:true});if(G.runCount===0&&(G.tutorialStage==='fadedIntro'||G.tutorialStage==='fadedSacrifice')){setTimeout(()=>runTutorialSequence('sacFeedback'),400);}}

function playCard(handIdx,slotIdx){const c=G.playerHand[handIdx];if(!c)return;if(G.playerSlots[slotIdx]){msg(LANG==='ko'?'슬롯 사용 중':'Slot occupied');return;}if(c.inkCost>G.currentInk+G.oblivionGauge){msg(LANG==='ko'?'자원 부족':'Not enough resources');return;}let cost=c.inkCost;const inkUsed=Math.min(G.currentInk,cost);G.currentInk-=inkUsed;cost-=inkUsed;if(cost>0){G.oblivionGauge-=cost;msg(LANG==='ko'?`망각 ${cost} 소모`:`Oblivion -${cost}`);}if(c.id!=='faded_memory')G.runStats.cardUsageCount[c.id]=(G.runStats.cardUsageCount[c.id]||0)+1;G.playerSlots[slotIdx]=c;G.playerHand.splice(handIdx,1);G.selectedHandIdx=null;

function flashHit(side,idx){const sel=`.${side}-slot[data-slot="${idx}"]`;const el=document.querySelector(sel);if(el)el.classList.add('hit');setTimeout(()=>el&&el.classList.remove('hit'),250);}

// MAP
// Dynamic map generation: tier-based layout so node counts scale with design target
function buildMap(room){
  const prefix = room===1?'r1':'r2';
  const tiers = room===1 ? [
    [{id:'start',type:'start'}],
    [{id:'battle_l',type:'battle'},{id:'relic',type:'relic'},{id:'chestA',type:'chestA'}],
    [{id:'reading',type:'reading'},{id:'battle_hint',type:'battle_hint'}],
    [{id:'chestB',type:'chestB'}],
    [{id:'battle_l2',type:'battle'},{id:'vault',type:'vault'},{id:'battle_r2',type:'battle'}],
    [{id:'reclass',type:'reclass'},{id:'fuse',type:'fuse'}],
    [{id:'mysteryA',type:'mysteryA'},{id:'campfire',type:'reading'}],
    [{id:'battle3_l',type:'battle_hint'},{id:'reading_late',type:'reading'},{id:'battle3_r',type:'battle'}],
    [{id:'chestC',type:'chestB'}],
    [{id:'battle4_l',type:'battle'},{id:'reading_mid',type:'reading'},{id:'battle4_r',type:'battle_hint'}],
    [{id:'vault2',type:'vault'},{id:'mysteryB',type:'mysteryB'}],
    [{id:'chestD',type:'chestB'}],
    [{id:'battle5_l',type:'battle_hint'},{id:'reading_deep',type:'reading'},{id:'battle5_r',type:'battle'}],
    [{id:'mysteryC',type:'mysteryC'},{id:'campfire2',type:'reading'}],
    [{id:'reclass2',type:'reclass'},{id:'fuse2',type:'fuse'}],
    [{id:'battle_pre',type:'battle'}],
    [{id:'locks',type:'locks'}],
    [{id:'boss',type:'boss'}]
  ] : [
    [{id:'start',type:'start'}],
    [{id:'battle_l',type:'battle'},{id:'relic',type:'relic'},{id:'mysteryA',type:'mysteryA'}],
    [{id:'chestA',type:'chestA'},{id:'reading',type:'reading'},{id:'vault',type:'vault'}],
    [{id:'chestB',type:'chestB'}],
    [{id:'battle_l2',type:'battle'},{id:'battle_mid',type:'battle'},{id:'mysteryB',type:'mysteryB'}],
    [{id:'mysteryC',type:'mysteryC'},{id:'fuse',type:'fuse'}],
    [{id:'reclass',type:'reclass'}],
    [{id:'battle3_l',type:'battle_hint'},{id:'mysteryD',type:'mysteryB'},{id:'battle3_r',type:'battle'}],
    [{id:'vault2',type:'vault'},{id:'reading2',type:'reading'}],
    [{id:'chestC',type:'chestB'}],
    [{id:'battle4',type:'battle'},{id:'campfire2',type:'reading'}],
    [{id:'reading3',type:'reading'}],
    [{id:'battle5_l',type:'battle_hint'},{id:'mysteryE',type:'mysteryC'},{id:'battle5_r',type:'battle'}],
    [{id:'vault3',type:'vault'}],
    [{id:'chestD',type:'chestB'}],
    [{id:'battle6_l',type:'battle'},{id:'reading4',type:'reading'},{id:'battle6_r',type:'battle_hint'}],
    [{id:'reclass2',type:'reclass'},{id:'fuse2',type:'fuse'}],
    [{id:'mysteryF',type:'mysteryA'}],
    [{id:'campfire3',type:'reading'}],
    [{id:'battle7_l',type:'battle'},{id:'battle7_r',type:'battle'}],
    [{id:'battle_pre',type:'battle'}],
    [{id:'locks',type:'locks'}],
    [{id:'boss',type:'boss'}]
  ];
  const yStep=55;const nodes={};
  tiers.forEach((tier,ti)=>{
    const y=40+ti*yStep;
    const n=tier.length;
    tier.forEach((spec,i)=>{
      let x;
      if(n===1)x=240;
      else if(n===2)x=[150,330][i];
      else x=[100,240,380][i];
      const id = spec.id==='start' && room===2 ? 'r2_start' : (spec.id==='start' ? 'start' : prefix+'_'+spec.id);
      nodes[id]={x,y,type:spec.type,c:[]};
      spec._id=id;
    });
  });
  // connect: each cur node connects only to a subset of next tier so path choice matters.
  // Pattern based on widths: 1→N covers all (single node fans out); N→1 all converge;
  // same width: i → i and one neighbor (alternating bias); width changes use proportional mapping.
  function pickConns(curIdx,curN,nxtN,parityBias){
    if(curN===1) return [...Array(nxtN).keys()];
    if(nxtN===1) return [0];
    if(curN===nxtN){
      // same width — i + one neighbor; bias alternates by parityBias for variety
      const arr=[curIdx];
      const dir=(curIdx+parityBias)%2===0?1:-1;
      const nb=curIdx+dir;
      if(nb>=0&&nb<nxtN)arr.push(nb);
      else if(curIdx-dir>=0&&curIdx-dir<nxtN)arr.push(curIdx-dir);
      return arr;
    }
    if(nxtN>curN){
      // expand — 2→3: 0→[0,1], 1→[1,2]
      const startIdx=Math.floor(curIdx*nxtN/curN);
      const endIdx=Math.min(nxtN-1,Math.floor((curIdx+1)*nxtN/curN));
      const arr=[];for(let j=startIdx;j<=endIdx;j++)arr.push(j);
      return arr.length?arr:[Math.min(nxtN-1,curIdx)];
    }
    // contract — 3→2: 0→[0], 1→[0,1], 2→[1]
    const arr=[Math.floor(curIdx*nxtN/curN)];
    if(curN>=3&&curIdx===Math.floor(curN/2)){
      const alt=Math.min(nxtN-1,arr[0]+1);if(alt!==arr[0])arr.push(alt);
    }
    return arr;
  }
  for(let ti=0;ti<tiers.length-1;ti++){
    const cur=tiers[ti],nxt=tiers[ti+1];
    cur.forEach((spec,i)=>{
      const conns=pickConns(i,cur.length,nxt.length,ti);
      nodes[spec._id].c=conns.map(j=>nxt[j]._id);
    });
    // Reachability guard: every nxt node must have at least one inbound edge
    for(let j=0;j<nxt.length;j++){
      const hasIn=cur.some(s=>nodes[s._id].c.includes(nxt[j]._id));
      if(!hasIn){
        const nearestCur=Math.floor(j*cur.length/nxt.length);
        nodes[cur[nearestCur]._id].c.push(nxt[j]._id);
      }
    }
  }
  return {nodes};
}

}

function enterMemBox(id,type){const H={r1_chestA:{idx:0,text:LANG==='ko'?'찢긴 입고 기록부: 입고일 11월 03일.':'A torn intake log. Entry date: November 03.'},r1_chestB:{idx:2,text:LANG==='ko'?'메모: 다이아몬드(◆), 삼각형(▲). "순서대로."':'A memo: ◆ then ▲. "In order."'},r1_chestC:{idx:1,text:LANG==='ko'?'명찰 조각 한 점: E _ I _ E.':'A badge fragment: E _ I _ E.'},r2_chestA:{idx:3,text:LANG==='ko'?'진열 표찰: property of _ _ _':'Display tag: property of _ _ _'},r2_chestB:{idx:5,text:LANG==='ko'?'전시 유물. 천의 색은 푸르렀다.':'The exhibit cloth. Its color, once. Blue.'},r2_chestC:{idx:6,text:LANG==='ko'?'사진 구석에 겨우 한 사람. 나머지 셋은 지워졌다.':'One face remains in the photo corner. The other three, erased.'}};const h=H[id]||{idx:-1,text:''};setScreen('memorybox',{id,type,text:h.text,hintIdx:h.idx});}

function renderCampfire(root){const lockRange=G.currentRoom===1?[0,1,2]:[3,4,5,6];const missingHints=lockRange.filter(i=>!G.collectedHints.includes(i));const canRecall=missingHints.length>0&&G.playerFragments>=2;const fin=()=>{G.completedNodes.push(G.currentNodeId);setScreen('map');};function showMenu(){root.innerHTML=`<div class="center" style="padding-top:40px"><h3>${T('campfire')}</h3><div class="panel dialogue">${LANG==='ko'?'잠시 쉰다. 불빛이 흔들린다.':'A brief rest. The flame flickers.'}</div><button id="h" style="display:block;margin:10px auto;width:80%">${T('heal')}</button><button id="u" style="display:block;margin:10px auto;width:80%">${T('upgrade')}</button><button id="rc" ${canRecall?'':'disabled'} style="display:block;margin:10px auto;width:80%">${LANG==='ko'?'힌트 추억하기 (조각 ✦2 희생)':'Recall a hint (sacrifice ✦2)'}</button></div>`;root.querySelector('#h').addEventListener('click',()=>{G.playerFragments=Math.min(5,G.playerFragments+1);fin();});root.querySelector('#u').addEventListener('click',showUpgradePicker);root.querySelector('#rc').addEventListener('click',()=>{if(!canRecall)return;const pick=missingHints[Math.floor(Math.random()*missingHints.length)];G.collectedHints.push(pick);G.playerFragments=Math.max(0,G.playerFragments-2);saveGame();modal(LANG==='ko'?'힌트':'Hint',HINTS[pick]?HINTS[pick]():'',fin);});}function showUpgradePicker(){const pool=G.playerDeck.map((c,i)=>({c,i})).filter(x=>x.c.id!=='faded_memory');if(!pool.length){msg(LANG==='ko'?'연마할 카드가 없습니다':'No cards to sharpen');return;}root.innerHTML=`<div class="center" style="padding-top:20px"><h3>${T('upgrade')}</h3><div class="panel dialogue" style="font-size:13px">${LANG==='ko'?'연마할 카드를 고르세요. 공격력이 +1 됩니다.':'Pick a card to sharpen. +1 attack.'}</div><div id="up-list" class="hand" style="flex-wrap:wrap;justify-content:center;max-height:440px;overflow-y:auto"></div><button id="up-back" style="display:block;margin:12px auto">${T('back')}</button></div>`;const list=root.querySelector('#up-list');pool.forEach(x=>{const el=renderCardEl(x.c,{onClick:()=>{x.c.attack+=1;msg((x.c.isFused?x.c.name:Tc(x.c.id))+' +1 ⚔');if(G.currentRoom===1&&!G.collectedHints.includes(1))G.collectedHints.push(1);fin();}});list.appendChild(el);});root.querySelector('#up-back').addEventListener('click',showMenu);}showMenu();}

function fuseCards(base,overlay){const bGen=base.fusionGen||0;const oGen=overlay.fusionGen||0;if(bGen>=2)return null;if(bGen===1&&oGen===1)return null;const nameOf=c=>c.isFused?c.name:Tc(c.id);const atk=base.attack+overlay.attack;const hp=base.maxHp+overlay.maxHp;const baseSigils=(base.sigils&&base.sigils.length)?base.sigils:(base.sigil?[base.sigil]:[]);const overlaySigils=(overlay.sigils&&overlay.sigils.length)?overlay.sigils:(overlay.sigil?[overlay.sigil]:[]);const merged=[...baseSigils];for(const s of overlaySigils){if(!merged.includes(s))merged.push(s);}const final=merged.slice(0,3);return{id:base.id,inkCost:base.inkCost,attack:atk,maxHp:hp,currentHp:hp,sigil:final[0]||null,sigils:final,fusionGen:bGen+1,uid:++UID,name:LANG==='ko'?`${nameOf(base)}+${nameOf(overlay)}`:`${nameOf(base)}+${nameOf(overlay)}`,isFused:true};}
function renderFuse(root){const eligible=(c)=>c&&c.id!=='faded_memory'&&!c.isDeath&&(c.fusionGen||0)<2;const pool=G.playerDeck.map((c,i)=>({c,i})).filter(x=>eligible(x.c));root.innerHTML=`<div class="center" style="padding-top:20px"><h3>${LANG==='ko'?'기억 조합':'Fusion'}</h3><div class="panel dialogue" style="font-size:13px">${LANG==='ko'?'첫 번째 카드의 모습에 두 번째 카드의 능력이 덧씌워집니다. (2세대 불가)':'The first card keeps its form; the second card lends its stats. (No gen-2 inputs)'}</div><div id="pv" class="panel" style="min-height:60px;margin:10px auto;max-width:360px">—</div><div id="fl" class="hand" style="flex-wrap:wrap;justify-content:center;max-height:340px;overflow-y:auto"></div><div class="row" style="justify-content:center;margin-top:10px"><button id="cf" class="primary" disabled>${LANG==='ko'?'합치기':'Fuse'}</button><button id="sk" style="margin-left:10px">${T('skip')}</button></div></div>`;const fl=root.querySelector('#fl');const pv=root.querySelector('#pv');const cf=root.querySelector('#cf');const sel=[];const refresh=()=>{if(sel.length===0){pv.textContent='—';cf.disabled=true;return;}const labels=sel.map((x,i)=>`${i===0?'🖼️':'⚡'} ${Tc(x.c.id)} (${x.c.attack}/${x.c.maxHp})`);if(sel.length===2){const preview=fuseCards(sel[0].c,sel[1].c);if(preview)labels.push(`→ <b>${preview.name}</b> (⚔${preview.attack}/❤${preview.maxHp}${preview.sigil?' · '+preview.sigil:''})`);}pv.innerHTML=labels.join('<br>');cf.disabled=sel.length!==2;};pool.forEach(x=>{const el=renderCardEl(x.c,{onClick:()=>{const idx=sel.indexOf(x);if(idx>=0){sel.splice(idx,1);el.classList.remove('selected');el.style.outline='';}else if(sel.length<2){sel.push(x);el.classList.add('selected');el.style.outline=`3px solid ${sel.length===1?'#c8a84b':'#8bc8e8'}`;}refresh();}});fl.appendChild(el);});root.querySelector('#sk').addEventListener('click',()=>{G.completedNodes.push(G.currentNodeId);setScreen('map');});cf.addEventListener('click',()=>{if(sel.length!==2)return;const fused=fuseCards(sel[0].c,sel[1].c);if(!fused){msg(LANG==='ko'?'합칠 수 없음':'Cannot fuse');return;}const rm=new Set([sel[0].i,sel[1].i]);G.playerDeck=G.playerDeck.filter((_,i)=>!rm.has(i));G.playerDeck.push(fused);msg((LANG==='ko'?'합침: ':'Fused: ')+fused.name);G.completedNodes.push(G.currentNodeId);setScreen('map');});}
function renderRelic(root){const keys=Object.keys(ITEMS);const picks=shuffle(keys).slice(0,3);root.innerHTML=`<div class="center" style="padding-top:40px"><h3>${LANG==='ko'?'유물함':'Relic Cache'}</h3><div class="panel dialogue">${LANG==='ko'?'먼지 쌓인 유물. 하나를 고르세요.':'Dusty relics. Pick one.'}</div><div class="row" id="rp" style="justify-content:center;flex-wrap:wrap;margin:16px 0;gap:10px"></div><button id="sk" style="display:block;margin:10px auto">${T('skip')}</button></div>`;const rp=root.querySelector('#rp');picks.forEach(k=>{const b=document.createElement('button');b.className='item-btn';b.style.fontSize='13px';b.style.padding='10px 12px';b.innerHTML=`<div style="font-size:22px">${ITEMS[k].icon}</div><div>${ITEMS[k].name[LANG]}</div>`;b.addEventListener('click',()=>{if(G.items.length>=3){msg(LANG==='ko'?'유물 가득 (3/3)':'Full (3/3)');return;}giveItem(k);G.completedNodes.push(G.currentNodeId);setScreen('map');});rp.appendChild(b);});root.querySelector('#sk').addEventListener('click',()=>{G.completedNodes.push(G.currentNodeId);setScreen('map');});}
function renderVault(root){const canRestore=G.deletedMsgs.length>0&&G.playerFragments>=1;root.innerHTML=`<div class="center" style="padding-top:40px"><h3>${T('vault')}</h3><div class="panel dialogue">${LANG==='ko'?'유리 진열장 앞. 손을 뻗으면 기억 하나를 되돌릴 수 있다.':'Before a glass case. You could return a memory.'}</div><button id="h" style="display:block;margin:10px auto;width:80%">${T('heal')}</button><button id="r" style="display:block;margin:10px auto;width:80%" ${canRestore?'':'disabled'}>${T('restore')}</button></div>`;const fin=()=>{G.completedNodes.push(G.currentNodeId);setScreen('map');};root.querySelector('#h').addEventListener('click',()=>{G.playerFragments=Math.min(5,G.playerFragments+1);fin();});root.querySelector('#r').addEventListener('click',()=>{G.deletedMsgs.pop();G.playerFragments-=1;saveGame();fin();});}

function renderExplore(root){const r1=G.currentRoom===1;const title=r1?(LANG==='ko'?'접수실':'Reception'):(LANG==='ko'?'복도':'Corridor');const objects=r1?[{label:LANG==='ko'?'접수 데스크':'Reception Desk',style:'left:12%;top:38%;width:110px;height:60px',text:LANG==='ko'?'서랍 안쪽에 찢긴 종이: "입고일 11월 03일."':'Inside the drawer, a torn paper: "Entry: Nov 03."',hint:0},{label:LANG==='ko'?'벽 게시판':'Wall Board',style:'left:60%;top:10%;width:120px;height:70px',text:LANG==='ko'?'공지: "유물은 만지지 마시오. — 관리인"':'Notice: "Do not touch the relics. —The Keeper"'},{label:LANG==='ko'?'낡은 방명록':'Old Guestbook',style:'left:20%;top:14%;width:100px;height:55px',text:LANG==='ko'?'"...J... 2025.11.03."':'"...J... 2025.11.03."'},{label:LANG==='ko'?'선반 상자':'Shelf Box',style:'left:68%;top:48%;width:100px;height:60px',text:G.solvedLocks[0]?(LANG==='ko'?'상자가 열린다. 안에 작은 결정 하나.':'The box opens. A small crystal inside.'):(LANG==='ko'?'잠겨있다.':'Locked.'),grant:G.solvedLocks[0]?'memory_crystal':null},{label:'🔒 '+(LANG==='ko'?'자물쇠':'Locks'),style:'left:38%;top:68%;width:110px;height:55px',goLocks:true}]:[{label:LANG==='ko'?'유리 케이스 A':'Glass Case A',style:'left:10%;top:14%;width:110px;height:60px',text:LANG==='ko'?'"property of _ _ _"':'"property of _ _ _"',hint:3},{label:LANG==='ko'?'유리 케이스 B':'Glass Case B',style:'left:60%;top:14%;width:110px;height:60px',text:G.solvedLocks[3]?(LANG==='ko'?'뚜껑이 열린다. 안에 색 바랜 천.':'Opened. A faded cloth inside.'):(LANG==='ko'?'잠겨있다.':'Locked.')},{label:LANG==='ko'?'벽 메모':'Wall Note',style:'left:18%;top:45%;width:110px;height:55px',text:LANG==='ko'?'"나도 누굴 찾고 있었어."':'"I was looking for someone too."'},{label:LANG==='ko'?'복도 끝 문':'End Door',style:'left:58%;top:45%;width:110px;height:60px',text:LANG==='ko'?'굳게 잠겨있다.':'Sealed shut.'},{label:'🔒 '+(LANG==='ko'?'자물쇠':'Locks'),style:'left:38%;top:70%;width:110px;height:55px',goLocks:true}];root.innerHTML=`<div class="center" style="padding:10px 0"><h3>${title}</h3><div class="dim" style="font-size:11px">${LANG==='ko'?'물건을 탭하세요.':'Tap objects.'}</div></div><div class="room-scene"><div class="wall"></div><div class="floor"></div>${objects.map((o,i)=>`<div class="obj" data-i="${i}" style="${o.style}">${o.label}</div>`).join('')}</div><div class="center"><button id="bk" style="margin-top:8px">${T('back')}</button></div>`;const fin=()=>{if(!G.completedNodes.includes(G.currentNodeId))G.completedNodes.push(G.currentNodeId);setScreen('map');};root.querySelectorAll('.obj').forEach(e=>{e.addEventListener('click',()=>{const o=objects[+e.dataset.i];if(o.goLocks){setScreen('lockpuzzle');return;}if(o.hint!==undefined&&!G.collectedHints.includes(o.hint))G.collectedHints.push(o.hint);if(o.grant&&!G.items.includes(o.grant)&&G.items.length<3){giveItem(o.grant);}modal(o.label,o.text);});});root.querySelector('#bk').addEventListener('click',fin);}
function renderReclass(root){
  const sc=G.sacrificeCounter||0;
  const NORMAL_POOL=['afterimage','memory_shard','lost_memory','archive_rat'];
  const HIGH_POOL=['old_book','forgotten_dog','echo','reverb_card','night_watcher'];
  const fin=()=>{G.completedNodes.push(G.currentNodeId);setScreen('map');};
  const cardDesc=id=>{const cd=CARDS[id];return `${Tc(id)} (${cd.inkCost}/⚔${cd.attack}/❤${cd.maxHp}${cd.sigil?' · '+(SIGIL_EMOJI[cd.sigil]||cd.sigil):''})`;};
  const confirmDelete=(cb)=>{const w=document.createElement('div');w.className='modal';const mc=document.createElement('div');mc.className='modal-content';mc.innerHTML=`<div class="speaker" style="color:var(--blood)">${LANG==='ko'?'경고':'Warning'}</div><div class="dialogue">${LANG==='ko'?'이 선택을 진행하면 기억 카운터가 10에 도달해 <b>J와의 대화 중 하나가 영구 삭제</b>됩니다. 정말 진행할까요?':'This choice pushes the memory counter to 10 and will <b>permanently delete one of J\u2019s messages</b>. Proceed?'}</div>`;const ok=document.createElement('button');ok.className='primary';ok.textContent=LANG==='ko'?'진행':'Proceed';ok.style.marginRight='8px';const no=document.createElement('button');no.textContent=LANG==='ko'?'취소':'Cancel';ok.addEventListener('click',()=>{w.remove();cb();});no.addEventListener('click',()=>w.remove());mc.appendChild(ok);mc.appendChild(no);w.appendChild(mc);document.body.appendChild(w);};
  function showMenu(){
    const dots=`${'●'.repeat(sc)}${'○'.repeat(10-sc)}`;
    const options=[
      {ok:G.playerDeck.some(c=>NORMAL_POOL.includes(c.id)),title:LANG==='ko'?'카드 교환 (일반)':'Trade (Normal)',desc:LANG==='ko'?'일반 카드 1장을 버리고 3장의 일반 카드 중 하나를 받습니다. 카운터 변동 없음.':'Discard a normal card, pick 1 of 3 offered normal cards. No counter change.',act:()=>showTrade('normal')},
      {ok:G.playerDeck.some(c=>HIGH_POOL.includes(c.id)),title:LANG==='ko'?'카드 교환 (고급)':'Trade (High)',desc:LANG==='ko'?'고급 카드 1장을 버리고 3장의 고급 카드 또는 유물 중 하나를 받습니다. 카운터 변동 없음.':'Discard a high-tier card, pick 1 of 3 high-tier cards or 1 relic. No counter change.',act:()=>showTrade('high')},
      {ok:sc>=3&&G.playerFragments<5,title:LANG==='ko'?`조각 회복 (카운터 -3)`:'Recover fragment (-3 counter)',desc:LANG==='ko'?`기억 카운터 ${dots.slice(0,3)}... 3칸을 되돌리고 내 조각 ✦ +1 얻습니다.`:'Spend 3 counter marks, gain +1 fragment.',act:()=>{G.sacrificeCounter=sc-3;G.playerFragments=Math.min(5,G.playerFragments+1);msg('✦+1');saveGame();fin();}},
      {ok:sc>=2,title:LANG==='ko'?'망각 충전 (카운터 -2)':'Oblivion charge (-2 counter)',desc:LANG==='ko'?'기억 카운터 2칸을 되돌리고 망각 게이지 +2 충전 (다음 전투에서 대체 자원으로 사용).':'Spend 2 counter marks, +2 oblivion for next battle.',act:()=>{G.sacrificeCounter=sc-2;G.oblivionGauge=Math.min(8,G.oblivionGauge+2);msg('🌫+2');saveGame();fin();}},
      {ok:sc>=4&&G.playerDeck.some(c=>c.id!=='faded_memory'),title:LANG==='ko'?'카드 연마 (카운터 -4)':'Sharpen card (-4 counter)',desc:LANG==='ko'?'카운터 4칸을 되돌리고 덱에서 카드 1장을 골라 ⚔ +1.':'Spend 4 counter, pick a card from deck for +1 attack.',act:()=>showSharpen()},
      {ok:sc>=5&&G.deletedMsgs.length>0,title:LANG==='ko'?'기억 복원 (카운터 -5)':'Restore memory (-5 counter)',desc:LANG==='ko'?`카운터 5칸을 되돌리고 이전에 삭제된 J의 메시지 1개를 복원합니다 (현재 삭제됨: ${G.deletedMsgs.length}개).`:`Spend 5 counter, restore a deleted J message (${G.deletedMsgs.length} deleted).`,act:()=>{G.sacrificeCounter=sc-5;G.deletedMsgs.pop();msg(LANG==='ko'?'기억 복원':'Memory restored');saveGame();fin();}},
      {ok:true,title:LANG==='ko'?'새 일반 카드 + 카운터 +3':'Add normal card + counter +3',desc:LANG==='ko'?`새 일반 카드 1장을 덱에 넣습니다. 대가로 기억 카운터가 +3 올라갑니다 (현재 ${sc}/10 → ${Math.min(10,sc+3)}/10).`+(sc+3>=10?' ⚠️ 카운터가 10에 닿으면 J 메시지 1개가 삭제됩니다.':''):'Gain 1 normal card. Counter +3.',danger:sc+3>=10,act:()=>{const go=()=>showNewCard(NORMAL_POOL,3);if(sc+3>=10)confirmDelete(go);else go();}},
      {ok:true,title:LANG==='ko'?'새 고급 카드 + 카운터 +5':'Add high card + counter +5',desc:LANG==='ko'?`새 고급 카드 1장을 덱에 넣습니다. 대가로 기억 카운터가 +5 올라갑니다 (현재 ${sc}/10 → ${Math.min(10,sc+5)}/10).`+(sc+5>=10?' ⚠️ 카운터가 10에 닿으면 J 메시지 1개가 삭제됩니다.':''):'Gain 1 high-tier card. Counter +5.',danger:sc+5>=10,act:()=>{const go=()=>showNewCard(HIGH_POOL,5);if(sc+5>=10)confirmDelete(go);else go();}}
    ];
    root.innerHTML=`<div class="center" style="padding:16px 8px 8px"><h3>${LANG==='ko'?'재분류실':'Reclassification'}</h3><div class="panel dialogue" style="font-size:12px;text-align:left">${LANG==='ko'?'여기서 <b>기억 카운터</b>를 소비하거나 늘리면서 덱을 조정할 수 있어요. 현재 카운터: <span class="gold">'+dots+'</span> ('+sc+'/10). 카운터가 10에 도달하면 J의 메시지 중 하나를 지워야 해요.':'Spend or raise the <b>memory counter</b> to reshape your deck. Counter: '+dots+' ('+sc+'/10). Reaching 10 forces a J message deletion.'}</div><div id="tr" style="margin:10px auto;max-width:360px"></div><button id="sk" style="display:block;margin:14px auto">${T('skip')}</button></div>`;
    const tr=root.querySelector('#tr');
    options.forEach(opt=>{const b=document.createElement('button');b.style.cssText='display:block;width:100%;margin:6px 0;padding:10px 12px;text-align:left;white-space:normal;line-height:1.35';b.disabled=!opt.ok;const col=opt.ok?(opt.danger?'#e28b6a':'var(--text-gold)'):'#6a5050';b.innerHTML=`<div style="color:${col};font-weight:600;font-size:13px;margin-bottom:3px">${opt.title}</div><div class="dim" style="font-size:11px">${opt.desc}</div>`;b.addEventListener('click',()=>opt.ok&&opt.act());tr.appendChild(b);});
    root.querySelector('#sk').addEventListener('click',fin);
  }
  function showTrade(tier){
    const pool=tier==='normal'?NORMAL_POOL:HIGH_POOL;
    const srcs=G.playerDeck.map((c,i)=>({c,i})).filter(x=>pool.includes(x.c.id));
    root.innerHTML=`<div class="center" style="padding:16px 8px"><h3>${LANG==='ko'?'희생할 카드 선택':'Pick card to discard'}</h3><div class="panel dialogue" style="font-size:12px">${LANG==='ko'?'덱에서 버릴 카드 1장을 고르세요.':'Choose one of your cards to discard.'}</div><div class="hand" id="srclist" style="flex-wrap:wrap;justify-content:center;max-height:360px;overflow-y:auto"></div><button id="bk" style="display:block;margin:10px auto">${T('back')}</button></div>`;
    const list=root.querySelector('#srclist');
    srcs.forEach(x=>{const el=renderCardEl(x.c,{onClick:()=>{const idx=G.playerDeck.indexOf(x.c);if(idx>=0)G.playerDeck.splice(idx,1);showOffer(tier);}});list.appendChild(el);});
    root.querySelector('#bk').addEventListener('click',showMenu);
  }
  function showOffer(tier){
    const pool=tier==='normal'?NORMAL_POOL:HIGH_POOL;
    const choices=shuffle([...pool]).slice(0,3).map(id=>mkCard(id));
    const extras=[];if(tier==='high'&&G.items.length<3){const keys=Object.keys(ITEMS);const k=keys[Math.floor(Math.random()*keys.length)];extras.push({isItem:true,key:k});}
    root.innerHTML=`<div class="center" style="padding:16px 8px"><h3>${LANG==='ko'?'받을 것을 선택':'Pick your reward'}</h3><div class="panel dialogue" style="font-size:12px">${LANG==='ko'?'셋 중 하나를 골라 덱에 넣으세요.':'Pick one to add to your deck.'}</div><div class="hand" id="offerlist" style="flex-wrap:wrap;justify-content:center;max-height:360px;overflow-y:auto"></div></div>`;
    const list=root.querySelector('#offerlist');
    choices.forEach(card=>{const el=renderCardEl(card,{onClick:()=>{G.playerDeck.push(card);msg((LANG==='ko'?'획득: ':'Got: ')+Tc(card.id));saveGame();fin();}});list.appendChild(el);});
    extras.forEach(ex=>{const b=document.createElement('button');b.className='item-btn';b.style.cssText='padding:10px 14px;font-size:13px;margin:6px';b.innerHTML=`${ITEMS[ex.key].icon} ${ITEMS[ex.key].name[LANG]}`;b.addEventListener('click',()=>{giveItem(ex.key);msg((LANG==='ko'?'유물 획득: ':'Relic: ')+ITEMS[ex.key].name[LANG]);saveGame();fin();});list.appendChild(b);});
  }
  function showNewCard(pool,addCount){
    const choices=shuffle([...pool]).slice(0,3).map(id=>mkCard(id));
    root.innerHTML=`<div class="center" style="padding:16px 8px"><h3>${LANG==='ko'?'새 기억':'New Memory'}</h3><div class="panel dialogue" style="font-size:12px">${LANG==='ko'?`셋 중 하나를 덱에 넣으세요. 선택 시 기억 카운터가 +${addCount} 됩니다.`:`Pick one to add. Counter +${addCount}.`}</div><div class="hand" id="nclist" style="flex-wrap:wrap;justify-content:center;max-height:360px;overflow-y:auto"></div><button id="bk" style="display:block;margin:10px auto">${T('back')}</button></div>`;
    const list=root.querySelector('#nclist');
    choices.forEach(card=>{const el=renderCardEl(card,{onClick:()=>{G.playerDeck.push(card);msg((LANG==='ko'?'획득: ':'Got: ')+Tc(card.id));G.sacrificeCounter=sc+addCount;if(G.sacrificeCounter>=10){G.sacrificeCounter=0;G.sacrificeMode=true;G.phoneOpen=true;document.getElementById('phoneOverlay')?.classList.add('open');renderPhone();msg(T('sacrifice_select'));}saveGame();fin();}});list.appendChild(el);});
    root.querySelector('#bk').addEventListener('click',showMenu);
  }
  function showSharpen(){
    const pool=G.playerDeck.map((c,i)=>({c,i})).filter(x=>x.c.id!=='faded_memory');
    root.innerHTML=`<div class="center" style="padding:16px 8px"><h3>${LANG==='ko'?'연마할 카드 선택':'Pick card to sharpen'}</h3><div class="panel dialogue" style="font-size:12px">${LANG==='ko'?'공격력 +1을 받을 카드를 고르세요.':'Pick a card to gain +1 attack.'}</div><div class="hand" id="shlist" style="flex-wrap:wrap;justify-content:center;max-height:360px;overflow-y:auto"></div><button id="bk" style="display:block;margin:10px auto">${T('back')}</button></div>`;
    const list=root.querySelector('#shlist');
    pool.forEach(x=>{const el=renderCardEl(x.c,{onClick:()=>{x.c.attack+=1;G.sacrificeCounter=sc-4;msg((x.c.isFused?x.c.name:Tc(x.c.id))+' +1 ⚔');saveGame();fin();}});list.appendChild(el);});
    root.querySelector('#bk').addEventListener('click',showMenu);
  }
  showMenu();
}
function renderMystery(root,opts){const txt={mysteryA:{idx:4,text:LANG==='ko'?'7번 케이스. 유리가 뿌옇다. 안에 손목밴드가 있다. 이름은 없다.':'Case #7. The glass is clouded. Inside, a wristband. No name.'},mysteryB:{idx:6,text:LANG==='ko'?'사진 한 장. 네 명. 세 얼굴이 가려져 있다.':'A single photo. Four people. Three faces are covered.'},mysteryC:{idx:-1,text:LANG==='ko'?'노트. 필체가 중간부터 바뀐다.':'A notebook. The handwriting shifts halfway.',rare:'forgotten_dog'}}[opts.type];const rareBtn=txt.rare?`<button class="primary" id="take" style="margin-top:8px">${LANG==='ko'?'기억 받기 ('+Tc(txt.rare)+')':'Take memory ('+Tc(txt.rare)+')'}</button>`:'';root.innerHTML=`<div class="center" style="padding-top:40px"><h3>${T('mystery')}</h3><div class="panel"><div class="dialogue">${txt.text}</div></div>${rareBtn}<button class="primary" id="b" style="margin-top:16px">${T('back')}</button></div>`;const done=()=>{if(txt.idx>=0&&!G.collectedHints.includes(txt.idx))G.collectedHints.push(txt.idx);G.completedNodes.push(G.currentNodeId);setScreen('map');};root.querySelector('#b').addEventListener('click',done);if(txt.rare)root.querySelector('#take').addEventListener('click',()=>{G.playerDeck.push(mkCard(txt.rare));G.playerDeck=shuffle(G.playerDeck);msg((LANG==='ko'?'획득: ':'Gained: ')+Tc(txt.rare));done();});}

// LOCKS
const LOCKS=[{a:'1103',t:'text'},{a:'ELISE',t:'text'},{a:['◆','▲'],t:'seq',s:['◆','▲','●','■']},{a:'OWN',t:'text'},{a:'7',t:'text'},{a:'BLUE',t:'text'},{a:['●'],t:'seq',s:['◆','▲','●','■']}];
const LOCK_LABELS=i=>{const ko=['날짜 (4자리)','이름 (5글자)','기호 순서','단어 (3글자)','숫자 (1자리)','색깔','기호'];const en=['Date (4 digits)','Name (5 letters)','Symbol order','Word (3 letters)','Number (1 digit)','Color','Symbol'];return (LANG==='ko'?ko:en)[i];};
const HINTS=[()=>LANG==='ko'?'입고일: 11월 03일':'Entry date: November 03',()=>LANG==='ko'?'명찰 조각: E _ I _ E':'Badge fragment: E _ I _ E',()=>LANG==='ko'?'다이아몬드, 그 다음 삼각형. 순서대로.':'Diamond, then triangle. In order.',()=>LANG==='ko'?'property of _ _ _':'property of _ _ _',()=>LANG==='ko'?'일곱 번째 줄만 새로 쓰여있다':'Only the seventh line is rewritten',()=>LANG==='ko'?'천의 색. 한때는.':'The cloth. Its color, once.',()=>LANG==='ko'?'넷 중 하나만 남아있다':'Only one of four remains'];

function openInBattleLocks(){
  const range=G.currentRoom===1?[0,1,2]:[3,4,5,6];
  const w=document.createElement('div');w.className='modal';w.style.padding='12px';
  const mc=document.createElement('div');mc.className='modal-content';mc.style.maxHeight='86vh';mc.style.overflowY='auto';mc.style.maxWidth='440px';
  w.appendChild(mc);document.body.appendChild(w);
  function redraw(){
    mc.innerHTML=`<h3 class="center" style="margin:0 0 8px">${T('locks')}</h3><div class="panel"><div class="speaker">${T('hints')} · ${G.collectedHints.length}</div><div id="h" class="dialogue" style="font-size:12px"></div></div><div id="lks"></div><button id="bb" class="primary" style="margin-top:10px;width:100%">${LANG==='ko'?'배틀로 돌아가기':'Back to battle'}</button>`;
    const hEl=mc.querySelector('#h');
    if(G.collectedHints.length===0)hEl.innerHTML=`<span class="dim">${LANG==='ko'?'힌트 없음 — 노드에서 힌트를 모으세요':'No hints — collect them on map nodes'}</span>`;
    G.collectedHints.forEach(i=>{const p=document.createElement('div');p.textContent='· '+HINTS[i]();p.style.marginTop='3px';hEl.appendChild(p);});
    const lkEl=mc.querySelector('#lks');
    range.forEach(i=>{
      const l=LOCKS[i];const panel=document.createElement('div');panel.className='panel';
      if(G.solvedLocks[i]){panel.innerHTML=`<div class="gold">✓ ${LOCK_LABELS(i)} — ${T('solved')}</div>`;}
      else if(l.t==='text'){
        panel.innerHTML=`<div class="speaker">${LANG==='ko'?'자물쇠 ':'Lock '}${i+1}</div><div>${LOCK_LABELS(i)}</div><input type="text" id="lk${i}" style="margin-top:6px"/><button class="primary" id="sub${i}" style="margin-top:6px;width:100%">${T('confirm')}</button>`;
        panel.querySelector('#lk'+i).addEventListener('keydown',ev=>{if(ev.key==='Enter')panel.querySelector('#sub'+i).click();});
        panel.querySelector('#sub'+i).addEventListener('click',()=>{const input=panel.querySelector('#lk'+i);const v=input.value.toUpperCase().trim();if(v===l.a){G.solvedLocks[i]=true;saveGame();msg(T('solved'));redraw();}else{msg(T('wrong'));input.value='';input.focus();}});
      } else {
        const seq=[];panel.innerHTML=`<div class="speaker">${LANG==='ko'?'자물쇠 ':'Lock '}${i+1}</div><div>${LOCK_LABELS(i)}</div><div id="sq${i}" style="font-size:26px;min-height:32px;margin:6px 0;color:var(--text-gold);letter-spacing:8px">·</div>`;
        const row=document.createElement('div');row.style.cssText='display:flex;flex-wrap:wrap;gap:2px';
        l.s.forEach(s=>{const b=document.createElement('button');b.textContent=s;b.style.cssText='width:44px;height:44px;font-size:20px;margin:2px';b.addEventListener('click',()=>{seq.push(s);panel.querySelector('#sq'+i).textContent=seq.join(' ');});row.appendChild(b);});
        const clr=document.createElement('button');clr.textContent='↺';clr.style.cssText='width:44px;height:44px;font-size:18px;margin:2px';clr.addEventListener('click',()=>{seq.length=0;panel.querySelector('#sq'+i).textContent='·';});row.appendChild(clr);
        const sub=document.createElement('button');sub.className='primary';sub.textContent=T('confirm');sub.style.cssText='margin-top:6px;width:100%';sub.addEventListener('click',()=>{if(JSON.stringify(seq)===JSON.stringify(l.a)){G.solvedLocks[i]=true;saveGame();msg(T('solved'));redraw();}else{msg(T('wrong'));seq.length=0;panel.querySelector('#sq'+i).textContent='·';}});
        panel.appendChild(row);panel.appendChild(sub);
      }
      lkEl.appendChild(panel);
    });
    mc.querySelector('#bb').addEventListener('click',()=>{w.remove();});
  }
  redraw();
}
function renderLockPuzzle(root){
  const range=G.currentRoom===1?[0,1,2]:[3,4,5,6];
  root.innerHTML=`<h3 class="center">${T('locks')}</h3><div class="panel"><div class="speaker">${T('hints')} · ${G.collectedHints.length}</div><div id="h" class="dialogue" style="font-size:12px"></div></div><div id="lks"></div><button id="b" style="margin:12px 0;display:block;width:100%">${T('back')}</button>`;
  const hEl=root.querySelector('#h');
  if(G.collectedHints.length===0)hEl.innerHTML=`<span class="dim">${LANG==='ko'?'힌트 없음':'No hints'}</span>`;
  G.collectedHints.forEach(i=>{const p=document.createElement('div');p.textContent='· '+HINTS[i]();p.style.marginTop='3px';hEl.appendChild(p);});
  const lkEl=root.querySelector('#lks');
  range.forEach(i=>{
    const l=LOCKS[i];const panel=document.createElement('div');panel.className='panel';
    if(G.solvedLocks[i]){panel.innerHTML=`<div class="gold">✓ ${LOCK_LABELS(i)} — ${T('solved')}</div>`;}
    else if(l.t==='text'){
      panel.innerHTML=`<div class="speaker">${LANG==='ko'?'자물쇠 ':'Lock '}${i+1}</div><div>${LOCK_LABELS(i)}</div><input type="text" id="lk${i}" style="margin-top:6px"/><button class="primary" id="sub${i}" style="margin-top:6px;width:100%">${T('confirm')}</button>`;
      panel.querySelector('#lk'+i).addEventListener('keydown',ev=>{if(ev.key==='Enter')panel.querySelector('#sub'+i).click();});panel.querySelector('#sub'+i).addEventListener('click',()=>{const input=panel.querySelector('#lk'+i);const v=input.value.toUpperCase().trim();if(v===l.a){G.solvedLocks[i]=true;saveGame();msg(T('solved'));const s=G.currentRoom===1?G.solvedLocks.slice(0,3):G.solvedLocks.slice(3,7);if(s.every(x=>x)){const id=G.currentRoom===1?'r1_locks':'r2_locks';if(!G.completedNodes.includes(id))G.completedNodes.push(id);setTimeout(()=>setScreen('map'),700);}else renderLockPuzzle(root);}else{msg(T('wrong'));input.value='';input.focus();}});
    }else{
      const seq=[];panel.innerHTML=`<div class="speaker">${LANG==='ko'?'자물쇠 ':'Lock '}${i+1}</div><div>${LOCK_LABELS(i)}</div><div id="sq${i}" style="font-size:26px;min-height:32px;margin:6px 0;color:var(--text-gold);letter-spacing:8px">·</div>`;
      const row=document.createElement('div');row.style.display='flex';row.style.flexWrap='wrap';
      l.s.forEach(s=>{const b=document.createElement('button');b.textContent=s;b.style.cssText='width:44px;height:44px;font-size:20px;margin:2px';b.addEventListener('click',()=>{seq.push(s);panel.querySelector('#sq'+i).textContent=seq.join(' ');});row.appendChild(b);});
      const cl=document.createElement('button');cl.textContent='↺';cl.style.cssText='width:44px;height:44px;margin:2px';cl.addEventListener('click',()=>{seq.length=0;panel.querySelector('#sq'+i).textContent='·';});row.appendChild(cl);
      panel.appendChild(row);
      const sub=document.createElement('button');sub.className='primary';sub.textContent=T('confirm');sub.style.cssText='width:100%;margin-top:6px';sub.addEventListener('click',()=>{if(JSON.stringify(seq)===JSON.stringify(l.a)){G.solvedLocks[i]=true;saveGame();msg(T('solved'));const s=G.currentRoom===1?G.solvedLocks.slice(0,3):G.solvedLocks.slice(3,7);if(s.every(x=>x)){const id=G.currentRoom===1?'r1_locks':'r2_locks';if(!G.completedNodes.includes(id))G.completedNodes.push(id);setTimeout(()=>setScreen('map'),700);}else renderLockPuzzle(root);}else{msg(T('wrong'));seq.length=0;panel.querySelector('#sq'+i).textContent='·';}});panel.appendChild(sub);

  root.querySelector('#b').addEventListener('click',()=>{const s=G.currentRoom===1?G.solvedLocks.slice(0,3):G.solvedLocks.slice(3,7);if(s.every(x=>x)){const id=G.currentRoom===1?'r1_locks':'r2_locks';if(!G.completedNodes.includes(id))G.completedNodes.push(id);}setScreen('map');});
}

function renderLoopEnding(root){const pages=LANG==='ko'?['탈출했다.','기숙사 방. 아침.','J의 문자: "야 어제 어디 있었어?"','평범한 하루인 것 같다.','...','핸드폰에 Recall 알림이 떴다.','"두 개의 새로운 기억이 기록되었습니다."']:['Escaped.','The dorm room. Morning.','A message from J: "hey where were you yesterday?"','It feels like an ordinary day.','...','A Recall notification appeared on the phone.','"Two new memories have been recorded."'];let p=0;function draw(){const isLast=p===pages.length-1;root.innerHTML=`<div style="padding-top:80px;min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px"><div class="dialogue center" style="font-size:18px;max-width:360px">${pages[p]}</div>${isLast?`<button class="primary" id="le-end">${LANG==='ko'?'계속':'Continue'}</button>`:`<div class="dim" style="font-size:11px;letter-spacing:0.2em;animation:fadeIn 1s">${LANG==='ko'?'— 탭하여 계속 —':'— tap to continue —'}</div>`}</div>`;if(isLast){root.querySelector('#le-end').addEventListener('click',adv);}else{root.addEventListener('click',adv,{once:true});}}function adv(){p++;if(p>=pages.length)setScreen('regression');else draw();}draw();}

function renderRegression(root){G.runCount++;G.rememberedCards=[...new Set([...G.rememberedCards,...G.diedThisRun])];G.diedThisRun=[];saveGame();const pages=LANG==='ko'?['기억이 수집되었습니다.','눈을 뜬다.','핸드폰이 손에 있다.','Recall이 켜져 있다.']:['Memory collected.','Eyes open.','The phone is in your hand.','Recall is running.'];let p=0;function draw(){root.innerHTML=`<div style="padding-top:120px;display:flex;align-items:center;justify-content:center;min-height:50vh"><div class="dialogue center" style="font-size:18px">${pages[p]}</div></div>`;}draw();const t=setInterval(()=>{p++;if(p>=pages.length){clearInterval(t);setScreen('title');return;}draw();},1300);root.addEventListener('click',()=>{clearInterval(t);setScreen('title');});}

// DEBUG + SIM
function showDebug(){const o=document.createElement('div');o.className='debug-overlay';const sl=s=>s.map(c=>c?c.id:'·').join(' | ');o.textContent=[`Screen: ${G.screen}`,`Run: ${G.runCount} Room: ${G.currentRoom} Node: ${G.currentNodeId}`,`Frag P/W: ${G.playerFragments}/${G.wardenFragments}`,`Ink: ${G.currentInk}  망각: ${G.oblivionGauge}/8  🔋${G.battery}%  Sac: ${G.sacrificeCounter}/10`,`Deck/Hand: ${G.playerDeck.length}/${G.playerHand.length}`,`PSlots: ${sl(G.playerSlots)}`,`WSlots: ${sl(G.wardenSlots)}`,`Hints: [${G.collectedHints.join(',')}]`,`Locks: [${G.solvedLocks.map(x=>x?'✓':'✗').join(',')}]`,`Remembered: [${G.rememberedCards.join(',')}]`,`DiedThisRun: [${G.diedThisRun.join(',')}]`,`DeletedMsgs: ${G.deletedMsgs.length}/${J_MSGS.length}`,'','(click to close)'].join('\n');o.addEventListener('click',()=>o.remove());document.body.appendChild(o);}

function runSim(){const log=[];let pass=0;function reset(){G.playerSlots=[null,null,null,null];G.wardenSlots=[null,null,null,null];G.playerFragments=5;G.wardenFragments=5;G.currentInk=0;G.battleDiscard=[];G.playerDeck=[];G.playerHand=[];}
  function a(cond,name,d){if(cond){log.push(`✓ ${name}`);pass++;}else log.push(`✗ ${name} — ${d||''}`);}
  reset();G.playerSlots[0]=mkCard('memory_shard');G.wardenSlots[0]=mkCard('forgotten_dog');const preFrag=G.wardenFragments;resolveCombat('player');a(G.wardenSlots[0]?.currentHp===2&&G.wardenFragments===preFrag,'T1 lane combat blocks fragment damage');
  reset();G.wardenSlots[0]=mkCard('afterimage');resolveCombat('warden');a(G.playerFragments===3,'T2 empty→frag');
  reset();G.playerSlots[0]=mkCard('afterimage');resolveCombat('player');a(G.wardenFragments===3,'T3 empty warden→frag');
  reset();G.wardenSlots[0]=mkCard('faded_memory');G.playerSlots[0]=mkCard('afterimage');G.oblivionGauge=0;resolveCombat('player');a(G.wardenSlots[0]===null&&G.oblivionGauge===1,'T4 death clears + oblivion +1');
  reset();const sh=mkCard('memory_shard');sh.currentHp=1;G.playerSlots[0]=sh;G.wardenSlots[0]=mkCard('echo');G.playerFragments=3;resolveCombat('warden');a(G.playerFragments===4,'T5 shatter',`frag=${G.playerFragments}`);
  reset();G.playerSlots[0]=mkCard('night_watcher');G.wardenSlots[0]=mkCard('echo');resolveCombat('warden');a(G.playerSlots[0]&&G.playerSlots[0].currentHp===1,'T6 vigilance');
  reset();G.playerSlots[0]=mkCard('reverb_card');G.wardenSlots[0]=mkCard('archive_rat');G.playerFragments=3;resolveCombat('warden');a(G.playerSlots[0]?.currentHp===1&&G.playerFragments===4,'T7 reverb');
  reset();G.playerSlots[0]=mkCard('archive_rat');G.wardenSlots[0]=mkCard('old_book');G.oblivionGauge=0;resolveCombat('player');a(G.playerSlots[0]===null&&G.oblivionGauge>=1,'T8 ephemeral self-destruct + oblivion');
  reset();G.oblivionGauge=2;const c=mkCard('afterimage');const pre=G.oblivionGauge;G.oblivionGauge-=c.inkCost;a(G.oblivionGauge===pre-c.inkCost&&G.oblivionGauge>=0,'T9 oblivion spend');
  reset();G.sacrificeCounter=9;G.sacrificeCounter+=1;const triggered=G.sacrificeCounter>=10;if(triggered)G.sacrificeCounter=0;a(triggered&&G.sacrificeCounter===0,'T10 counter→10 resets');
  // T11: explore overlay opens with 3 walls and tabs; modal opens above overlay
  reset();G.currentRoom=1;G.screen='map';G.seenSigils=['shatter'];openExploreOverlay();const ov=document.querySelector('.expl-overlay');const wallsEx=document.querySelectorAll('.room3d-wall').length;const tabsEx=document.querySelectorAll('.expl-tab').length;const ovZ=ov?parseInt(getComputedStyle(ov).zIndex):0;a(wallsEx===3&&tabsEx===3&&ovZ===240,'T11 explore overlay structure');ov?.remove();
  // T12: modal z-index higher than expl-overlay
  reset();const mw=document.createElement('div');mw.className='modal';document.body.appendChild(mw);const mZ=parseInt(getComputedStyle(mw).zIndex);mw.remove();a(mZ===300&&mZ>240,'T12 modal z-index above explore overlay');
  // T13: sigil codex opens with all 10 sigils, gray for unseen
  reset();G.seenSigils=['vigilance'];openSigilEncyclopedia();const sigPanels=document.querySelectorAll('.expl-overlay .panel').length;const grayed=Array.from(document.querySelectorAll('.expl-overlay .panel')).filter(p=>p.style.opacity==='0.5').length;a(sigPanels===10&&grayed===9,'T13 sigil codex 10 entries, 9 unseen');document.querySelector('.expl-overlay')?.remove();
  // T14: floating door + sigil buttons present on map screen
  reset();G.screen='map';ensureFabStack();const fabDoor=!!document.querySelector('#fabExplore');const fabSig=!!document.querySelector('#fabSigil');a(fabDoor&&fabSig,'T14 FAB stack on map screen');
  // T15: post-boss missing-hint reveal: collectedHints starts incomplete, after grant fills lockRange
  reset();G.currentRoom=2;G.collectedHints=[3];const range=[3,4,5,6];const missing=range.filter(i=>!G.collectedHints.includes(i));missing.forEach(i=>G.collectedHints.push(i));a(G.collectedHints.length===4&&range.every(i=>G.collectedHints.includes(i)),'T15 post-boss hint grant fills room range');
  log.push('');log.push(`${pass}/15 passed`);console.log(log.join('\n'));const o=document.createElement('div');o.className='sim-log';o.textContent=log.join('\n')+'\n\n(click to close)';o.addEventListener('click',()=>o.remove());document.body.appendChild(o);}

window.addEventListener('keydown',e=>{const t=e.target;if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable))return;if(e.key==='d'||e.key==='D')showDebug();if((e.key==='t'||e.key==='T')&&G.screen==='title')runSim();});

loadGame();
setScreen('title');
window.G=G;
